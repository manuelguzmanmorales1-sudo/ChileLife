<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chile Life</title>
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <img src="img/logo.png" alt="Chile Life" class="logo">
        <h2>Chile Life</h2>
      </div>
      <nav id="main-nav">
        <div class="nav-section" data-roles="ciudadano,carabinero,pdi,municipal,admin">
          <span class="nav-section-title">General</span>
          <a href="#" class="nav-item active" data-page="inicio"><i class="fas fa-home"></i> Inicio</a>
          <a href="#" class="nav-item" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
          <a href="#" class="nav-item" data-page="dni"><i class="fas fa-id-card"></i> Crear DNI</a>
          <a href="#" class="nav-item" data-page="banco"><i class="fas fa-university"></i> Banco</a>
          <a href="#" class="nav-item" data-page="tienda"><i class="fas fa-store"></i> Tienda</a>
          <a href="#" class="nav-item" data-page="inventario"><i class="fas fa-backpack"></i> Inventario</a>
        </div>

        <div class="nav-section" data-roles="carabinero,admin">
          <span class="nav-section-title">Carabineros de Chile Life</span>
          <a href="#" class="nav-item" data-page="carabineros-comisaria"><i class="fas fa-building"></i> Comisaría Virtual</a>
          <a href="#" class="nav-item" data-page="carabineros-aupol"><i class="fas fa-search"></i> AUPOL</a>
        </div>

        <div class="nav-section" data-roles="pdi,admin">
          <span class="nav-section-title">PDI - Policía de Investigaciones</span>
          <a href="#" class="nav-item" data-page="pdi-prefectura"><i class="fas fa-building"></i> Prefectura Virtual</a>
          <a href="#" class="nav-item" data-page="pdi-gepol"><i class="fas fa-search"></i> GEPOL</a>
        </div>

        <div class="nav-section" data-roles="municipal,admin">
          <span class="nav-section-title">Municipalidad</span>
          <a href="#" class="nav-item" data-page="municipalidad-seguridad"><i class="fas fa-shield-alt"></i> SNSM</a>
        </div>

        <div class="nav-section" data-roles="ciudadano,carabinero,pdi,municipal,admin">
          <span class="nav-section-title">Sistema OD</span>
          <a href="#" class="nav-item" data-page="od-sistema"><i class="fas fa-cogs"></i> Sistema OD</a>
        </div>
        <div class="nav-section" data-roles="admin">
          <span class="nav-section-title">Administración</span>
          <a href="#" class="nav-item" data-page="admin-panel"><i class="fas fa-crown"></i> Panel Admin</a>
          <a href="#" class="nav-item" data-page="panel-staff"><i class="fas fa-user-shield"></i> Panel de Staff</a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <i class="fas fa-user-circle"></i>
          <span id="user-name">Usuario</span>
          <span id="user-role-badge" style="font-size:10px;background:var(--bg-input);padding:2px 6px;border-radius:10px;margin-left:4px;display:none;"></span>
        </div>
        <button id="logout-btn" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </aside>

    <main id="main-content">
      <header id="topbar">
        <button id="menu-toggle"><i class="fas fa-bars"></i></button>
        <button id="back-btn" class="back-pill hidden" onclick="App.navigate('inicio')">
          <i class="fas fa-arrow-left"></i> Volver a Inicio
        </button>
        <h3 id="page-title">Inicio</h3>
        <div class="topbar-right">
          <span id="clock"></span>
        </div>
      </header>
      <div id="page-content"></div>
    </main>
  </div>


  <div id="modal-overlay" class="hidden">
    <div id="modal-content">
      <div id="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="css/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/modules/dni.js"></script>
  <script src="js/modules/inventario.js"></script>
  <script src="js/modules/banco.js"></script>
  <script src="js/modules/tienda.js"></script>
  <script src="js/modules/concesionario.js"></script>
  <script src="js/modules/carabineros/comisaria.js"></script>
  <script src="js/modules/carabineros/aupol.js"></script>
  <script src="js/modules/pdi/prefectura.js"></script>
  <script src="js/modules/pdi/gepol.js"></script>
  <script src="js/modules/municipalidad/seguridad.js"></script>
  <script src="js/modules/admin/admin.js"></script>
  <script src="js/modules/admin/panel-staff.js"></script>
  <script src="js/modules/admin/roles.js"></script>
  <script src="js/modules/admin/economia.js"></script>
  <script src="js/modules/od/sistema.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
